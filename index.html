<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deck di Ripasso con Flip Card</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f4f7fb;
      --text: #1f2937;
      --muted: #6b7280;
      --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 { margin: 0 0 12px; text-align: center; }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.5;
    }

    .hidden { display: none !important; }

    /* HOME */
    #deckGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .deck-box {
      position: relative;
      border-radius: 18px;
      padding: 16px;
      color: white;
      cursor: pointer;
      transition: transform 0.28s ease, box-shadow 0.28s ease;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-shadow: var(--card-shadow);
      overflow: hidden;
      isolation: isolate;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    .deck-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: var(--deck-image);
      background-size: cover;
      background-position: center;
      z-index: -2;
      transition: transform 0.45s ease;
    }

    .deck-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0.28) 36%, rgba(0,0,0,0.66) 100%);
      z-index: -1;
    }

    .deck-box:hover { transform: scale(1.035) translateY(-4px); }
    .deck-box:hover::before { transform: scale(1.08); }

    .deck-box h3 { margin: 0 0 8px; font-size: 1.15rem; }
    .deck-box .meta {
      font-size: 0.82rem;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.25);
      width: fit-content;
    }

    /* CARD VIEW */
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn.secondary { background: #e5edff; color: var(--primary); }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: #e8f0ff;
      color: var(--primary);
      font-weight: bold;
      font-size: 0.92rem;
    }

    .scene {
      width: min(90vw, 760px);
      height: 410px;
      perspective: 1200px;
      margin: 0 auto;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: white;
    }

    .back { transform: rotateY(180deg); background: #eff6ff; }

    .label { font-size: 0.85rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
    .content { font-size: 1.25rem; line-height: 1.5; white-space: pre-wrap; overflow-y: auto; }

    .question-image-wrap { margin-bottom: 16px; text-align: center; }
    .question-image { max-width: 100%; max-height: 180px; border-radius: 12px; }

    .nav-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
    .timer { margin-top: 12px; font-size: 1.2rem; font-weight: bold; color: var(--primary); text-align: center; }
    .info { margin-top: 15px; color: var(--muted); text-align: center; font-size: 0.9rem; }
    .error { color: #b91c1c; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="wrap">
    <div id="homeView">
      <h1>Scegli un argomento</h1>
      <p class="subtitle">Seleziona un deck di ripasso per iniziare.</p>
      <div id="deckGrid"></div>
      <div class="error" id="homeErrorBox"></div>
    </div>

    <div id="cardView" class="hidden">
      <div class="topbar">
        <div>
          <button id="backBtn" class="btn secondary">← Deck</button>
          <span class="pill" id="deckTitlePill">Deck</span>
        </div>
        <div class="pill" id="remainingPill">0 rimaste</div>
      </div>

      <div class="scene">
        <div class="card" id="flipCard">
          <div class="face front">
            <div class="label">Domanda</div>
            <div id="questionImageWrap" class="question-image-wrap hidden">
              <img id="questionImage" class="question-image" src="" alt="Immagine">
            </div>
            <div class="content" id="questionBox">Caricamento...</div>
          </div>
          <div class="face back">
            <div class="label">Risposta</div>
            <div class="content" id="answerBox">Caricamento...</div>
          </div>
        </div>
      </div>

      <div class="nav-buttons">
        <button id="prevBtn" class="btn secondary">← Precedente</button>
        <button id="skipBtn" class="btn">Salta →</button>
      </div>

      <div class="timer" id="timerBox">5:00</div>
      <div class="info" id="infoBox"></div>
      <div class="error" id="errorBox"></div>
    </div>
  </div>

  <script>
    const INDEX_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6KYDov_GRWZoW1hhiAAZL1SNyGjHD9K2K-vQiYWOkx60MKaWZx33ERVdjNDZV7LuyGxCblyeeiM0Y/pub?gid=0&single=true&output=csv';

    // Elementi DOM
    const homeView = document.getElementById('homeView');
    const cardView = document.getElementById('cardView');
    const deckGrid = document.getElementById('deckGrid');
    const flipCard = document.getElementById('flipCard');
    const questionBox = document.getElementById('questionBox');
    const answerBox = document.getElementById('answerBox');
    const timerBox = document.getElementById('timerBox');
    const infoBox = document.getElementById('infoBox');
    const questionImageWrap = document.getElementById('questionImageWrap');
    const questionImage = document.getElementById('questionImage');

    // Stato
    let cards = [];
    let remainingCards = [];
    let shownHistory = [];
    let historyIndex = -1;
    let isFlipped = false;
    let timer = null;
    let timeLeft = 300;

    // --- UTILITY ---
    function normalizeHeader(key) {
      return String(key || '').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    }

    function getValue(row, keys) {
      for (const key of keys) {
        const normK = normalizeHeader(key);
        if (row[normK] !== undefined && String(row[normK]).trim() !== '') return String(row[normK]).trim();
      }
      return '';
    }

    // Funzione Shuffle (Fisher-Yates)
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    async function loadCsvRows(url) {
      const resp = await fetch(url, { cache: 'no-store' });
      const text = await resp.text();
      const wb = XLSX.read(text, { type: 'string' });
      return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
    }

    // --- LOGICA CORE ---
    async function loadDeckIndex() {
      try {
        const rows = await loadCsvRows(INDEX_URL);
        const decks = rows.map(r => ({
          titolo: getValue(r, ['titolo', 'title', 'nome']),
          url: getValue(r, ['url', 'link']),
          materia: getValue(r, ['materia']),
          descrizione: getValue(r, ['descrizione']),
          colore: getValue(r, ['colore']),
          link_img: getValue(r, ['link_img', 'immagine'])
        })).filter(d => d.titolo && d.url);
        renderDecks(decks);
      } catch (e) { document.getElementById('homeErrorBox').textContent = e.message; }
    }

    function renderDecks(decks) {
      deckGrid.innerHTML = '';
      decks.forEach(d => {
        const b = document.createElement('div');
        b.className = 'deck-box';
        b.style.backgroundColor = d.colore || '#2563eb';
        if (d.link_img) b.style.setProperty('--deck-image', `url('${d.link_img}')`);
        b.innerHTML = `<div class="meta">${d.materia}</div><h3>${d.titolo}</h3><p>${d.descrizione || ''}</p>`;
        b.onclick = () => selectDeck(d);
        deckGrid.appendChild(b);
      });
    }

    async function selectDeck(deck) {
      document.documentElement.style.setProperty('--primary', deck.colore || '#2563eb');
      document.getElementById('deckTitlePill').textContent = deck.titolo;
      shownHistory = [];
      historyIndex = -1;
      await loadCards(deck.url);
      homeView.classList.add('hidden');
      cardView.classList.remove('hidden');
    }

    async function loadCards(url) {
      try {
        const rows = await loadCsvRows(url);
        cards = rows.map(r => ({
          question: getValue(r, ['question', 'domanda']),
          answer: getValue(r, ['answer', 'risposta']),
          imageUrl: getValue(r, ['url_img', 'immagine']),
          unit: getValue(r, ['unit', 'argomento']),
          level: getValue(r, ['level', 'livello'])
        })).filter(c => c.question && c.answer);
        
        remainingCards = shuffleArray([...cards]); // Mescola all'inizio
        await showRandomCard();
      } catch (e) { alert("Errore caricamento carte."); }
    }

    async function renderCard(card) {
      questionBox.innerHTML = card.question;
      answerBox.innerHTML = card.answer;
      if (card.imageUrl) {
        questionImage.src = card.imageUrl;
        questionImageWrap.classList.remove('hidden');
      } else {
        questionImageWrap.classList.add('hidden');
      }
      flipCard.classList.remove('flipped');
      isFlipped = false;
      await typeset();
      updateInfo();
      resetTimer();
    }

    async function showRandomCard() {
      if (!cards.length) return;
      if (remainingCards.length === 0) remainingCards = shuffleArray([...cards]);

      const nextCard = remainingCards.pop();

      if (historyIndex < shownHistory.length - 1) {
        shownHistory = shownHistory.slice(0, historyIndex + 1);
      }
      shownHistory.push(nextCard);
      historyIndex = shownHistory.length - 1;

      await renderCard(nextCard);
    }

    async function showPreviousCard() {
      if (historyIndex <= 0) return;
      historyIndex--;
      await renderCard(shownHistory[historyIndex]);
    }

    // --- UI & MATH ---
    function resetTimer() {
      clearInterval(timer);
      timeLeft = 300;
      updateTimerUI();
      timer = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) clearInterval(timer);
      }, 1000);
    }

    function updateTimerUI() {
      const m = Math.floor(timeLeft/60);
      const s = timeLeft%60;
      timerBox.textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }

    function updateInfo() {
      document.getElementById('remainingPill').textContent = `${remainingCards.length} rimaste`;
      infoBox.textContent = isFlipped ? "Clicca per la prossima" : "Clicca per girare";
    }

    async function typeset() {
      if (window.MathJax && MathJax.typesetPromise) await MathJax.typesetPromise();
    }

    // --- EVENTI ---
    flipCard.onclick = async () => {
      if (!isFlipped) {
        flipCard.classList.add('flipped');
        isFlipped = true;
        updateInfo();
      } else {
        await showRandomCard();
      }
    };

    document.getElementById('backBtn').onclick = () => {
      clearInterval(timer);
      homeView.classList.remove('hidden');
      cardView.classList.add('hidden');
    };

    document.getElementById('skipBtn').onclick = () => showRandomCard();
    document.getElementById('prevBtn').onclick = () => showPreviousCard();

    // Start
    loadDeckIndex();
  </script>
</body>
</html>
