<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards App - Pro</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f4f7fb;
      --text: #1f2937;
      --muted: #6b7280;
      --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    .wrap { max-width: 800px; margin: 0 auto; padding: 15px; }
    
    h1 { text-align: center; font-size: 1.5rem; margin-bottom: 5px; }
    .subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
    .hidden { display: none !important; }

    /* HOME GRID */
    #deckGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    .deck-box { 
      position: relative; border-radius: 15px; padding: 15px; color: white; cursor: pointer; 
      min-height: 180px; display: flex; flex-direction: column; justify-content: flex-end;
      box-shadow: var(--card-shadow); transition: transform 0.2s; overflow: hidden; isolation: isolate;
    }
    .deck-box::before { 
      content: ''; position: absolute; inset: 0; background-image: var(--deck-image); 
      background-size: cover; background-position: center; z-index: -2; 
    }
    .deck-box::after { 
      content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 100%); z-index: -1; 
    }
    .deck-box:active { transform: scale(0.98); }
    .deck-box h3 { margin: 0; font-size: 1.1rem; }

    /* TOPBAR */
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
    .btn { padding: 8px 16px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
    .btn.secondary { background: #fff; color: var(--primary); border: 1px solid #ddd; }
    .pill { padding: 6px 12px; background: #e8f0ff; color: var(--primary); border-radius: 15px; font-weight: bold; font-size: 0.8rem; }

    /* CARD SCENE */
    .scene { width: 100%; height: 70vh; max-height: 500px; perspective: 1200px; margin: 0 auto; }
    .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .card.flipped { transform: rotateY(180deg); }
    
    .face { 
      position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; 
      padding: 20px; background: white; box-shadow: var(--card-shadow); 
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .back { transform: rotateY(180deg); background: #fdfdff; }
    
    .label { font-size: 0.7rem; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; width: 100%; text-align: left; }
    .content { font-size: 1.15rem; width: 100%; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }

    /* IMMAGINI NELLE CARTE */
    .img-wrap { width: 100%; display: flex; justify-content: center; padding: 5px 0; flex-shrink: 0; }
    .card-img { max-width: 100%; max-height: 180px; border-radius: 8px; object-fit: contain; }
    
    /* NAV & TIMER */
    .nav-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    .timer { margin-top: 10px; font-size: 1.2rem; font-weight: bold; color: var(--primary); text-align: center; }
    
    @media (max-width: 480px) {
      .scene { height: 65vh; }
      .content { font-size: 1rem; }
      .card-img { max-height: 140px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div id="homeView">
    <h1>I miei Deck</h1>
    <p class="subtitle">Tocca un argomento per studiare</p>
    <div id="deckGrid"></div>
  </div>

  <div id="cardView" class="hidden">
    <div class="topbar">
      <button id="backBtn" class="btn secondary">Indietro</button>
      <span id="deckTitlePill" class="pill">...</span>
      <span id="remainingPill" class="pill">0</span>
    </div>

    <div class="scene">
      <div class="card" id="flipCard">
        <div class="face front">
          <div class="label">Domanda</div>
          <div id="qImgWrap" class="img-wrap hidden">
            <img id="qImg" class="card-img" src="" alt="Fronte">
          </div>
          <div id="questionBox" class="content"></div>
        </div>
        <div class="face back">
          <div class="label">Risposta</div>
          <div id="answerBox" class="content"></div>
          <div id="aImgWrap" class="img-wrap hidden">
            <img id="aImg" class="card-img" src="" alt="Retro">
          </div>
        </div>
      </div>
    </div>

    <div class="nav-buttons">
      <button id="prevBtn" class="btn secondary">← Precedente</button>
      <button id="skipBtn" class="btn">Prossima →</button>
    </div>
    <div id="timerBox" class="timer">5:00</div>
  </div>
</div>

<script>
  const INDEX_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6KYDov_GRWZoW1hhiAAZL1SNyGjHD9K2K-vQiYWOkx60MKaWZx33ERVdjNDZV7LuyGxCblyeeiM0Y/pub?gid=0&single=true&output=csv';

  let cards = [], remainingCards = [], shownHistory = [], historyIndex = -1;
  let isFlipped = false, timer = null, timeLeft = 300;

  const homeView = document.getElementById('homeView'), cardView = document.getElementById('cardView');
  const flipCard = document.getElementById('flipCard'), timerBox = document.getElementById('timerBox');

  // Utility per normalizzare i nomi delle colonne
  function norm(k) { return String(k||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, ''); }
  
  function getVal(row, keys) {
    const nRow = {}; Object.keys(row).forEach(k => nRow[norm(k)] = row[k]);
    for (const key of keys) { const nk = norm(key); if (nRow[nk]) return String(nRow[nk]).trim(); }
    return '';
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  async function loadCsv(url) {
    const res = await fetch(url, { cache: 'no-store' });
    const text = await res.text();
    const wb = XLSX.read(text, { type: 'string' });
    return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
  }

  // INIT HOME
  async function init() {
    try {
      const rows = await loadCsv(INDEX_URL);
      const grid = document.getElementById('deckGrid');
      grid.innerHTML = '';
      rows.forEach(r => {
        const d = { 
          titolo: getVal(r, ['titolo', 'title']), 
          url: getVal(r, ['url', 'link']),
          img: getVal(r, ['link_img', 'immagine']),
          colore: getVal(r, ['colore', 'color']) 
        };
        if (!d.titolo || !d.url) return;
        const div = document.createElement('div');
        div.className = 'deck-box';
        div.style.backgroundColor = d.colore || '#2563eb';
        if (d.img) div.style.setProperty('--deck-image', `url('${d.img}')`);
        div.innerHTML = `<h3>${d.titolo}</h3>`;
        div.onclick = () => selectDeck(d);
        grid.appendChild(div);
      });
    } catch (e) { alert("Errore caricamento indice."); }
  }

  // SELEZIONE DECK
  async function selectDeck(deck) {
    document.documentElement.style.setProperty('--primary', deck.colore || '#2563eb');
    document.getElementById('deckTitlePill').textContent = deck.titolo;
    homeView.classList.add('hidden');
    cardView.classList.remove('hidden');
    
    try {
      const rows = await loadCsv(deck.url);
      cards = rows.map(r => ({
        q: getVal(r, ['question', 'domanda']),
        a: getVal(r, ['answer', 'risposta']),
        qImg: getVal(r, ['URL_img']), // Colonna Domanda
        aImg: getVal(r, ['URL_Risp']) // Colonna Risposta
      })).filter(c => c.q);
      
      remainingCards = shuffle([...cards]);
      shownHistory = []; historyIndex = -1;
      await showNext();
    } catch (e) { alert("Errore caricamento deck."); }
  }

  // RENDER CARTA
  async function renderCard(card) {
    if (!card) return;
    document.getElementById('questionBox').innerHTML = card.q;
    document.getElementById('answerBox').innerHTML = card.a;
    
    // Gestione Immagine Domanda (Sopra)
    const qi = document.getElementById('qImg'), qw = document.getElementById('qImgWrap');
    if (card.qImg) { qi.src = card.qImg; qw.classList.remove('hidden'); }
    else { qw.classList.add('hidden'); }

    // Gestione Immagine Risposta (Sotto)
    const ai = document.getElementById('aImg'), aw = document.getElementById('aImgWrap');
    if (card.aImg) { ai.src = card.aImg; aw.classList.remove('hidden'); }
    else { aw.classList.add('hidden'); }

    flipCard.classList.remove('flipped');
    isFlipped = false;
    
    if (window.MathJax && MathJax.typesetPromise) await MathJax.typesetPromise();
    document.getElementById('remainingPill').textContent = remainingCards.length;
    resetTimer();
  }

  async function showNext() {
    if (historyIndex < shownHistory.length - 1) {
      historyIndex++;
      await renderCard(shownHistory[historyIndex]);
    } else {
      if (remainingCards.length === 0) remainingCards = shuffle([...cards]);
      const c = remainingCards.pop();
      shownHistory.push(c);
      historyIndex = shownHistory.length - 1;
      await renderCard(c);
    }
  }

  // TIMER
  function resetTimer() {
    clearInterval(timer);
    timeLeft = 300;
    timer = setInterval(() => {
      timeLeft--;
      const m = Math.floor(timeLeft/60), s = timeLeft%60;
      timerBox.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      if (timeLeft <= 0) clearInterval(timer);
    }, 1000);
  }

  // EVENTI
  flipCard.onclick = () => {
    if (!isFlipped) { flipCard.classList.add('flipped'); isFlipped = true; }
    else { showNext(); }
  };

  document.getElementById('skipBtn').onclick = (e) => { e.stopPropagation(); showNext(); };
  document.getElementById('prevBtn').onclick = (e) => { 
    e.stopPropagation(); 
    if (historyIndex > 0) { historyIndex--; renderCard(shownHistory[historyIndex]); }
  };
  document.getElementById('backBtn').onclick = () => {
    clearInterval(timer);
    homeView.classList.remove('hidden');
    cardView.classList.add('hidden');
  };

  init();
</script>
</body>
</html>
