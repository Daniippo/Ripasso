<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards App</title>
    <style>
        /* Stili Generali */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Layout Home (Griglia Box) */
        #home-screen { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .deck-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: transform 0.2s; border: 2px solid #007bff; color: #007bff; font-weight: bold; }
        .deck-box:hover { transform: translateY(-5px); background: #007bff; color: white; }

        /* Layout Deck e Flip Cards */
        #deck-screen { max-width: 600px; margin: 0 auto; text-align: center; }
        .card-container { perspective: 1000px; width: 100%; height: 300px; margin: 20px 0; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-container.flipped .card-inner { transform: rotateY(180px); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; padding: 20px; border-radius: 15px; box-sizing: border-box; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card-front { background: white; color: #333; }
        .card-back { background: #007bff; color: white; transform: rotateY(180px); }

        /* Pulsanti di Navigazione */
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: #333; color: white; font-size: 1rem; }
        #home-btn { background: #28a745; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h2 style="grid-column: 1/-1; text-align: center;">Seleziona un Deck</h2>
        </div>

    <div id="deck-screen" class="hidden">
        <button id="home-btn">🏠 Torna alla Home</button>
        <h3 id="deck-title">Titolo Deck</h3>
        
        <div class="card-container" id="card-container">
            <div class="card-inner">
                <div class="card-front" id="card-front">Caricamento...</div>
                <div class="card-back" id="card-back">...</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">Precedente</button>
            <button onclick="nextCard()">Successiva</button>
        </div>
    </div>

    <script>
        const INDEX_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6KYDov_GRWZoW1hhiAAZL1SNyGjHD9K2K-vQiYWOkx60MKaWZx33ERVdjNDZV7LuyGxCblyeeiM0Y/pub?gid=0&single=true&output=csv";
        
        let currentCards = [];
        let currentIndex = 0;

        // 1. Carica l'indice all'avvio
        window.onload = fetchIndex;

        async function fetchIndex() {
            try {
                const response = await fetch(INDEX_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // Salta l'intestazione
                
                const homeScreen = document.getElementById('home-screen');
                homeScreen.innerHTML = '<h2 style="grid-column: 1/-1; text-align: center;">I Tuoi Mazzi</h2>';

                rows.forEach(row => {
                    const columns = row.split(','); // Assumi: Nome Deck, URL Deck
                    if (columns.length >= 2) {
                        const deckName = columns[0].trim();
                        const deckUrl = columns[1].trim();

                        const box = document.createElement('div');
                        box.className = 'deck-box';
                        box.innerText = deckName;
                        box.onclick = () => loadDeck(deckName, deckUrl);
                        homeScreen.appendChild(box);
                    }
                });
            } catch (error) {
                console.error("Errore caricamento indice:", error);
            }
        }

        // 2. Carica il deck specifico
        async function loadDeck(name, url) {
            try {
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                currentCards = rows.map(row => {
                    const cols = row.split(',');
                    return { front: cols[0], back: cols[1] };
                }).filter(c => c.front); // Rimuove righe vuote

                currentIndex = 0;
                document.getElementById('deck-title').innerText = name;
                showCard();
                
                // Switch Schermata
                document.getElementById('home-screen').classList.add('hidden');
                document.getElementById('deck-screen').classList.remove('hidden');
            } catch (error) {
                alert("Errore nel caricamento del deck.");
            }
        }

        // 3. Gestione Flip Card
        function showCard() {
            const card = currentCards[currentIndex];
            document.getElementById('card-front').innerText = card.front;
            document.getElementById('card-back').innerText = card.back;
            document.getElementById('card-container').classList.remove('flipped');
        }

        document.getElementById('card-container').onclick = function() {
            this.classList.toggle('flipped');
        };

        function nextCard() {
            if (currentIndex < currentCards.length - 1) {
                currentIndex++;
                showCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                showCard();
            }
        }

        // 4. Tasto Home
        document.getElementById('home-btn').onclick = () => {
            document.getElementById('deck-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        };
    </script>
</body>
</html>
