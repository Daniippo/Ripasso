<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Card da Google Sheet</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    h1 {
      margin-bottom: 16px;
      text-align: center;
    }

    .scene {
      width: min(90vw, 700px);
      height: 380px;
      perspective: 1200px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s ease;
      cursor: pointer;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: white;
    }

    .front {
      background: linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
    }

    .back {
      transform: rotateY(180deg);
      background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
    }

    .label {
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      color: #2563eb;
      margin-bottom: 12px;
      letter-spacing: 0.06em;
    }

    .content {
      font-size: 1.25rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .info {
      margin-top: 18px;
      color: #6b7280;
      text-align: center;
      max-width: 700px;
      line-height: 1.5;
    }

    .timer {
      margin-top: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1d4ed8;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
      margin-top: 16px;
      text-align: center;
      max-width: 700px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Flip Card da Google Sheet</h1>

  <div class="scene">
    <div class="card" id="flipCard">
      <div class="face front">
        <div class="label">Domanda</div>
        <div class="content" id="questionBox">Caricamento carta...</div>
      </div>
      <div class="face back">
        <div class="label">Risposta</div>
        <div class="content" id="answerBox">Caricamento risposta...</div>
      </div>
    </div>
  </div>

  <div class="timer" id="timerBox">5:00</div>
  <div class="info" id="infoBox">Clicca sulla carta per girarla.</div>
  <div class="error" id="errorBox"></div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6KYDov_GRWZoW1hhiAAZL1SNyGjHD9K2K-vQiYWOkx60MKaWZx33ERVdjNDZV7LuyGxCblyeeiM0Y/pub?gid=770836420&single=true&output=csv";

    const flipCard = document.getElementById("flipCard");
    const questionBox = document.getElementById("questionBox");
    const answerBox = document.getElementById("answerBox");
    const infoBox = document.getElementById("infoBox");
    const errorBox = document.getElementById("errorBox");
    const timerBox = document.getElementById("timerBox");

    let cards = [];
    let remainingCards = [];
    let currentCard = null;
    let isFlipped = false;
    let timer = null;
    let timeLeft = 300;

    function normalizeHeader(key) {
      return String(key || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function getValue(row, keys) {
      const normalized = {};
      Object.keys(row).forEach(key => {
        normalized[normalizeHeader(key)] = row[key];
      });

      for (const key of keys) {
        const normalizedKey = normalizeHeader(key);
        if (
          normalized[normalizedKey] !== undefined &&
          normalized[normalizedKey] !== null &&
          String(normalized[normalizedKey]).trim() !== ""
        ) {
          return String(normalized[normalizedKey]).trim();
        }
      }
      return "";
    }

    function normalizeCard(row, index) {
      const question = getValue(row, ["question", "domanda", "quesito"]);
      const answer = getValue(row, ["answer", "risposta", "spiegazione", "soluzione"]);
      const unit = getValue(row, ["unit", "unita", "argomento"]);
      const level = getValue(row, ["level", "livello"]);
      const time = getValue(row, ["time", "tempo"]);
      const id = getValue(row, ["id", "numero", "n"]) || String(index + 1);

      return {
        id,
        unit,
        level,
        time,
        question,
        answer
      };
    }

    function updateTimerDisplay() {
      const min = Math.floor(timeLeft / 60);
      const sec = timeLeft % 60;
      timerBox.textContent = `${min}:${sec.toString().padStart(2, "0")}`;
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = 300;
      updateTimerDisplay();

      timer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        if (timeLeft <= 0) {
          clearInterval(timer);
          infoBox.textContent += " ⏰ Tempo scaduto!";
        }
      }, 1000);
    }

    function updateInfo() {
      if (!currentCard) return;

      const details = [];
      if (currentCard.unit) details.push(currentCard.unit);
      if (currentCard.level) details.push("Livello " + currentCard.level);
      if (currentCard.time) details.push(currentCard.time);

      details.push(`Carte rimaste: ${remainingCards.length}`);

      if (!isFlipped) {
        details.push("Clicca per vedere la risposta");
      } else {
        details.push("Clicca di nuovo per la prossima carta");
      }

      infoBox.textContent = details.join(" • ");
    }

    function showRandomCard() {
      if (!cards.length) return;

      if (!remainingCards.length) {
        remainingCards = [...cards];
      }

      const randomIndex = Math.floor(Math.random() * remainingCards.length);
      currentCard = remainingCards.splice(randomIndex, 1)[0];

      questionBox.textContent = currentCard.question;
      answerBox.textContent = currentCard.answer;

      flipCard.classList.remove("flipped");
      isFlipped = false;

      updateInfo();
      startTimer();
    }

    async function loadCards() {
      errorBox.textContent = "";

      try {
        const response = await fetch(CSV_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const csvText = await response.text();

        if (/<!doctype html/i.test(csvText) || /<html/i.test(csvText)) {
          throw new Error("Il link non restituisce un CSV valido.");
        }

        const workbook = XLSX.read(csvText, { type: "string" });
        const sheetName = workbook.SheetNames[0];

        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {
          defval: "",
          raw: false
        });

        const parsedCards = rows
          .map((row, index) => normalizeCard(row, index))
          .filter(card => card.question && card.answer);

        if (!parsedCards.length) {
          throw new Error("Non ho trovato colonne valide per domanda e risposta.");
        }

        cards = parsedCards;
        remainingCards = [...cards];

        showRandomCard();
      } catch (error) {
        errorBox.textContent = "Errore nel caricamento delle carte: " + error.message;
        questionBox.textContent = "Errore caricamento.";
        answerBox.textContent = "Controlla il foglio o il link CSV.";
      }
    }

    flipCard.addEventListener("click", () => {
      if (!currentCard) return;

      if (!isFlipped) {
        flipCard.classList.add("flipped");
        isFlipped = true;
        updateInfo();
      } else {
        showRandomCard();
      }
    });

    loadCards();
  </script>
</body>
</html>
