<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deck di Ripasso con Flip Card</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\(', '\)']],
        displayMath: [['$$', '$$'], ['\[', '\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f4f7fb;
      --text: #1f2937;
      --muted: #6b7280;
      --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.5;
    }

    .hidden { display: none !important; }

    /* HOME */
    #deckGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .deck-box {
      border-radius: 18px;
      padding: 16px;
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .deck-box:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.12);
    }

    .deck-box img {
      width: 100%;
      max-height: 120px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.2);
    }

    .deck-box h3 {
      margin: 0 0 8px;
      font-size: 1.15rem;
      line-height: 1.3;
    }

    .deck-box .meta {
      font-size: 0.9rem;
      opacity: 0.95;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .deck-box p {
      margin: 0;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    /* CARD VIEW */
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .left-topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 0.98rem;
      font-weight: bold;
      cursor: pointer;
    }

    .btn.secondary {
      background: #e5edff;
      color: var(--primary);
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: #e8f0ff;
      color: var(--primary);
      font-weight: bold;
      font-size: 0.92rem;
    }

    .scene {
      width: min(90vw, 760px);
      height: 410px;
      perspective: 1200px;
      margin: 0 auto;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s ease;
      cursor: pointer;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: white;
    }

    .front {
      background: linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
    }

    .back {
      transform: rotateY(180deg);
      background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
    }

    .label {
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
      letter-spacing: 0.06em;
    }

    .content {
      font-size: 1.25rem;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow: auto;
    }

    .below-card {
      margin-top: 18px;
      text-align: center;
    }

    .timer {
      margin-top: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
    }

    .info {
      margin-top: 18px;
      color: var(--muted);
      text-align: center;
      max-width: 760px;
      line-height: 1.5;
      margin-inline: auto;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
      margin-top: 16px;
      text-align: center;
      max-width: 760px;
      white-space: pre-wrap;
      margin-inline: auto;
    }

    @media (max-width: 700px) {
      .scene {
        height: 470px;
      }
      .content {
        font-size: 1.08rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="homeView">
      <h1>Scegli un argomento</h1>
      <p class="subtitle">Seleziona un argomento di ripasso</p>
      <div id="deckGrid"></div>
      <div class="error" id="homeErrorBox"></div>
    </div>

    <div id="cardView" class="hidden">
      <div class="topbar">
        <div class="left-topbar">
          <button id="backBtn" class="btn secondary">← Torna agli argomenti</button>
          <span class="pill" id="deckTitlePill">Deck</span>
        </div>
        <div class="pill" id="remainingPill">Carte rimaste: 0</div>
      </div>

      <h1 id="cardViewTitle">Flip Card</h1>
      <p class="subtitle" id="cardViewSubtitle">Primo click: gira la carta. Secondo click: carta successiva.</p>

      <div class="scene">
        <div class="card" id="flipCard">
          <div class="face front">
            <div class="label">Domanda</div>
            <div class="content" id="questionBox">Caricamento carta...</div>
          </div>
          <div class="face back">
            <div class="label">Risposta</div>
            <div class="content" id="answerBox">Caricamento risposta...</div>
          </div>
        </div>
      </div>

      <div class="below-card">
        <div class="timer" id="timerBox">5:00</div>
        <div class="info" id="infoBox">Clicca sulla carta per girarla.</div>
        <div class="error" id="errorBox"></div>
      </div>
    </div>
  </div>

  <script>
    const INDEX_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6KYDov_GRWZoW1hhiAAZL1SNyGjHD9K2K-vQiYWOkx60MKaWZx33ERVdjNDZV7LuyGxCblyeeiM0Y/pub?gid=0&single=true&output=csv';

    const homeView = document.getElementById('homeView');
    const cardView = document.getElementById('cardView');
    const deckGrid = document.getElementById('deckGrid');
    const homeErrorBox = document.getElementById('homeErrorBox');
    const backBtn = document.getElementById('backBtn');
    const deckTitlePill = document.getElementById('deckTitlePill');
    const remainingPill = document.getElementById('remainingPill');
    const cardViewTitle = document.getElementById('cardViewTitle');
    const cardViewSubtitle = document.getElementById('cardViewSubtitle');

    const flipCard = document.getElementById('flipCard');
    const questionBox = document.getElementById('questionBox');
    const answerBox = document.getElementById('answerBox');
    const infoBox = document.getElementById('infoBox');
    const errorBox = document.getElementById('errorBox');
    const timerBox = document.getElementById('timerBox');

    let cards = [];
    let remainingCards = [];
    let currentCard = null;
    let isFlipped = false;
    let timer = null;
    let timeLeft = 300;
    let currentDeck = null;

    function normalizeHeader(key) {
      return String(key || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    function normalizeRow(row) {
      const normalized = {};
      Object.keys(row || {}).forEach(key => {
        normalized[normalizeHeader(key)] = row[key];
      });
      return normalized;
    }

    function getValue(row, keys) {
      const normalized = normalizeRow(row);
      for (const key of keys) {
        const normalizedKey = normalizeHeader(key);
        if (normalized[normalizedKey] !== undefined && String(normalized[normalizedKey]).trim() !== '') {
          return String(normalized[normalizedKey]).trim();
        }
      }
      return '';
    }

    async function loadCsvRows(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const csvText = await response.text();

      if (/<!doctype html/i.test(csvText) || /<html/i.test(csvText)) {
        throw new Error('Il link non restituisce un CSV valido.');
      }

      const workbook = XLSX.read(csvText, { type: 'string' });
      const sheetName = workbook.SheetNames[0];
      return XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {
        defval: '',
        raw: false
      });
    }

    function showHomeView() {
      homeView.classList.remove('hidden');
      cardView.classList.add('hidden');
    }

    function showCardView() {
      homeView.classList.add('hidden');
      cardView.classList.remove('hidden');
    }

    function applyThemeColor(color) {
      if (!color) return;
      document.documentElement.style.setProperty('--primary', color);
    }

    function normalizeDeck(row, index) {
      return {
        id: getValue(row, ['id']) || String(index + 1),
        materia: getValue(row, ['materia', 'subject']),
        titolo: getValue(row, ['titolo', 'title', 'nome']),
        url: getValue(row, ['url', 'link']),
        descrizione: getValue(row, ['descrizione', 'description']),
        colore: getValue(row, ['colore', 'color']),
        link_img: getValue(row, ['link_img', 'image', 'immagine'])
      };
    }

    function renderDeckSelection(decks) {
      deckGrid.innerHTML = '';

      decks.forEach(deck => {
        const box = document.createElement('div');
        box.className = 'deck-box';
        box.style.background = deck.colore || '#2563eb';
if (deck.link_img) {
  box.style.backgroundImage = `
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url('${deck.link_img}')
  `;
  box.style.backgroundSize = "cover";
  box.style.backgroundPosition = "center";
}
       box.innerHTML = `
  <div class="meta">${deck.materia || ''}</div>
  <h3>${deck.titolo || ''}</h3>
  <p>${deck.descrizione || ''}</p>
`;

        box.addEventListener('click', () => {
          selectDeck(deck);
        });

        deckGrid.appendChild(box);
      });
    }

    async function loadDeckIndex() {
      homeErrorBox.textContent = '';
      try {
        const rows = await loadCsvRows(INDEX_URL);
        const decks = rows
          .map((row, index) => normalizeDeck(row, index))
          .filter(deck => deck.titolo && deck.url);

        if (!decks.length) {
          throw new Error('Nell’indice non ho trovato deck validi. Controlla le colonne: titolo, url, descrizione, colore, link_img.');
        }

        renderDeckSelection(decks);
      } catch (error) {
        homeErrorBox.textContent = 'Errore nel caricamento dell’indice: ' + error.message;
      }
    }

    function normalizeCard(row, index) {
      const question = getValue(row, ['question', 'domanda', 'quesito']);
      const answer = getValue(row, ['answer', 'risposta', 'spiegazione', 'soluzione']);
      const unit = getValue(row, ['unit', 'unita', 'argomento']);
      const level = getValue(row, ['level', 'livello']);
      const time = getValue(row, ['time', 'tempo']);
      const id = getValue(row, ['id', 'numero', 'n']) || String(index + 1);

      return { id, unit, level, time, question, answer };
    }

    function updateTimerDisplay() {
      const min = Math.floor(timeLeft / 60);
      const sec = timeLeft % 60;
      timerBox.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = 300;
      updateTimerDisplay();
      timer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
          clearInterval(timer);
          infoBox.textContent += ' ⏰ Tempo scaduto!';
        }
      }, 1000);
    }

    function updateInfo() {
      if (!currentCard) return;
      const details = [];
      if (currentCard.unit) details.push(currentCard.unit);
      if (currentCard.level) details.push('Livello ' + currentCard.level);
      if (currentCard.time) details.push(currentCard.time);
      details.push(`Carte rimaste: ${remainingCards.length}`);
      details.push(isFlipped ? 'Clicca di nuovo per la prossima carta' : 'Clicca per vedere la risposta');
      infoBox.textContent = details.join(' • ');
      remainingPill.textContent = `Carte rimaste: ${remainingCards.length}`;
    }

    async function typesetMath() {
      if (window.MathJax && window.MathJax.typesetPromise) {
        MathJax.typesetClear([questionBox, answerBox]);
        await MathJax.typesetPromise([questionBox, answerBox]);
      }
    }

    async function showRandomCard() {
      if (!cards.length) return;
      if (!remainingCards.length) remainingCards = [...cards];

      const randomIndex = Math.floor(Math.random() * remainingCards.length);
      currentCard = remainingCards.splice(randomIndex, 1)[0];

      questionBox.innerHTML = currentCard.question;
      answerBox.innerHTML = currentCard.answer;

      flipCard.classList.remove('flipped');
      isFlipped = false;

      await typesetMath();
      updateInfo();
      startTimer();
    }

    async function loadCardsFromUrl(url) {
      errorBox.textContent = '';
      try {
        const rows = await loadCsvRows(url);
        const parsedCards = rows
          .map((row, index) => normalizeCard(row, index))
          .filter(card => card.question && card.answer);

        if (!parsedCards.length) {
          throw new Error('Non ho trovato colonne valide per domanda e risposta.');
        }

        cards = parsedCards;
        remainingCards = [...cards];
        await showRandomCard();
      } catch (error) {
        errorBox.textContent = 'Errore nel caricamento delle carte: ' + error.message;
        questionBox.textContent = 'Errore caricamento.';
        answerBox.textContent = 'Controlla il foglio o il link CSV.';
      }
    }

    async function selectDeck(deck) {
      currentDeck = deck;
      applyThemeColor(deck.colore);
      deckTitlePill.textContent = deck.titolo || 'Deck';
      cardViewTitle.textContent = deck.titolo || 'Flip Card';
      cardViewSubtitle.textContent = deck.descrizione || 'Primo click: gira la carta. Secondo click: carta successiva.';
      await loadCardsFromUrl(deck.url);
      showCardView();
    }

    flipCard.addEventListener('click', async () => {
      if (!currentCard) return;
      if (!isFlipped) {
        flipCard.classList.add('flipped');
        isFlipped = true;
        updateInfo();
      } else {
        await showRandomCard();
      }
    });

    backBtn.addEventListener('click', () => {
      clearInterval(timer);
      showHomeView();
    });

    showHomeView();
    loadDeckIndex();
  </script>
</body>
</html>
