<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards con Report PDF</title>
  
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --bg: #f4f7fb;
      --text: #1f2937;
      --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 800px; margin: 0 auto; padding: 15px; }
    .hidden { display: none !important; }
    
    /* UI ELEMENTS */
    .deck-box { 
      background: var(--primary); color: white; padding: 20px; border-radius: 15px; 
      margin-bottom: 10px; cursor: pointer; text-align: center;
    }
    .btn { padding: 10px 20px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin: 5px; }
    .btn.secondary { background: #64748b; }
    .btn.success { background: #059669; }

    /* CARD STYLE */
    .scene { width: 100%; height: 450px; perspective: 1200px; margin: 20px 0; }
    .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
    .card.flipped { transform: rotateY(180deg); }
    .face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; padding: 25px; background: white; box-shadow: var(--card-shadow); display: flex; flex-direction: column; align-items: center; text-align: center; }
    .back { transform: rotateY(180deg); background: #f8faff; }
    .content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; font-size: 1.2rem; }
    .img-wrap img { max-width: 100%; max-height: 150px; border-radius: 8px; margin: 10px 0; }

    /* COMPLETAMENTO */
    #completionView { text-align: center; padding: 40px 20px; }
    input#userName { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 250px; margin-bottom: 20px; }

    /* STILE DEL REPORT PDF (Nascosto nel browser) */
    #reportArea { padding: 40px; background: white; color: black; }
    .report-item { border-bottom: 1px solid #eee; padding: 20px 0; page-break-inside: avoid; }
    .report-img { max-width: 200px; display: block; margin: 10px 0; }
    .report-header { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 30px; }
  </style>
</head>
<body>

<div class="wrap">
  <div id="homeView">
    <h1>Scegli un Deck</h1>
    <div id="deckGrid"></div>
  </div>

  <div id="cardView" class="hidden">
    <div style="display:flex; justify-content: space-between;">
      <button class="btn secondary" onclick="location.reload()">Indietro</button>
      <span id="counter" class="btn secondary" style="cursor:default">0/0</span>
    </div>
    
    <div class="scene">
      <div class="card" id="flipCard">
        <div class="face front">
          <strong>DOMANDA</strong>
          <div id="qImgWrap" class="img-wrap"></div>
          <div id="qBox" class="content"></div>
        </div>
        <div class="face back">
          <strong>RISPOSTA</strong>
          <div id="aBox" class="content"></div>
          <div id="aImgWrap" class="img-wrap"></div>
        </div>
      </div>
    </div>
    
    <div style="text-align:center">
      <button class="btn secondary" id="prevBtn">Indietro</button>
      <button class="btn" id="nextBtn">Prossima</button>
    </div>
  </div>

  <div id="completionView" class="hidden">
    <h2>🎉 Ottimo lavoro!</h2>
    <p>Hai visualizzato tutte le carte del mazzo.</p>
    <input type="text" id="userName" placeholder="Inserisci il tuo Nome e Cognome"><br>
    <button class="btn success" onclick="generatePDF()">Stampa Report PDF</button>
    <button class="btn" onclick="sendEmail()">Invia a Docente</button>
  </div>
</div>

<div id="reportArea" class="hidden"></div>

<script>
  const INDEX_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6KYDov_GRWZoW1hhiAAZL1SNyGjHD9K2K-vQiYWOkx60MKaWZx33ERVdjNDZV7LuyGxCblyeeiM0Y/pub?gid=0&single=true&output=csv';

  let allCards = [], remainingCards = [], shownHistory = [], historyIndex = -1;
  let currentDeckName = "";
  let isFlipped = false;

  // Caricamento Iniziale
  async function init() {
    const res = await fetch(INDEX_URL);
    const text = await res.text();
    const rows = XLSX.utils.sheet_to_json(XLSX.read(text, {type:'string'}).Sheets.Sheet1);
    
    const grid = document.getElementById('deckGrid');
    rows.forEach(r => {
      const btn = document.createElement('div');
      btn.className = 'deck-box';
      btn.innerText = r.titolo || r.Titolo;
      btn.onclick = () => loadDeck(r.url || r.URL, r.titolo || r.Titolo);
      grid.appendChild(btn);
    });
  }

  async function loadDeck(url, titolo) {
    currentDeckName = titolo;
    const res = await fetch(url);
    const text = await res.text();
    const rows = XLSX.utils.sheet_to_json(XLSX.read(text, {type:'string'}).Sheets.Sheet1);
    
    allCards = rows.map(r => ({
      q: r.domanda || r.question || r.Domanda,
      a: r.risposta || r.answer || r.Risposta,
      qImg: r.URL_img || "",
      aImg: r.URL_Risp || ""
    })).filter(c => c.q);

    remainingCards = [...allCards].sort(() => Math.random() - 0.5);
    document.getElementById('homeView').classList.add('hidden');
    document.getElementById('cardView').classList.remove('hidden');
    showNext();
  }

  function renderCard(card) {
    document.getElementById('qBox').innerHTML = card.q;
    document.getElementById('aBox').innerHTML = card.a;
    
    // Immagini
    document.getElementById('qImgWrap').innerHTML = card.qImg ? `<img src="${card.qImg}">` : "";
    document.getElementById('aImgWrap').innerHTML = card.aImg ? `<img src="${card.aImg}">` : "";
    
    document.getElementById('flipCard').classList.remove('flipped');
    isFlipped = false;
    document.getElementById('counter').innerText = `${shownHistory.length}/${allCards.length}`;
    if(window.MathJax) MathJax.typesetPromise();
  }

  function showNext() {
    if (historyIndex < shownHistory.length - 1) {
      historyIndex++;
      renderCard(shownHistory[historyIndex]);
    } else if (remainingCards.length > 0) {
      const c = remainingCards.pop();
      shownHistory.push(c);
      historyIndex = shownHistory.length - 1;
      renderCard(c);
    } else {
      // FINE MAZZO
      document.getElementById('cardView').classList.add('hidden');
      document.getElementById('completionView').classList.remove('hidden');
    }
  }

  // GENERAZIONE PDF
  function generatePDF() {
    const nome = document.getElementById('userName').value || "Studente Anonimo";
    const report = document.getElementById('reportArea');
    report.classList.remove('hidden');
    
    let html = `
      <div class="report-header">
        <h1>Report Ripasso Flashcards</h1>
        <p><strong>Studente:</strong> ${nome}</p>
        <p><strong>Argomento:</strong> ${currentDeckName}</p>
        <p>Data: ${new Date().toLocaleDateString()}</p>
      </div>`;

    shownHistory.forEach((c, i) => {
      html += `
        <div class="report-item">
          <p><strong>Card ${i+1}</strong></p>
          <p><strong>D:</strong> ${c.q}</p>
          ${c.qImg ? `<img class="report-img" src="${c.qImg}">` : ""}
          <p><strong>R:</strong> ${c.a}</p>
          ${c.aImg ? `<img class="report-img" src="${c.aImg}">` : ""}
        </div>`;
    });

    report.innerHTML = html;

    const opt = {
      margin: 10,
      filename: `Report_${currentDeckName}_${nome}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(report).save().then(() => {
      report.classList.add('hidden');
    });
  }

  function sendEmail() {
    const nome = document.getElementById('userName').value || "Uno studente";
    const mailto = "daniela.ippolito@liceocavalierivb.edu.it";
    const subject = encodeURIComponent(`Completamento Deck: ${currentDeckName} - ${nome}`);
    const body = encodeURIComponent(`Salve Prof.ssa,\n\nHo completato il mazzo "${currentDeckName}".\nIn allegato (caricarlo manualmente) invio il report generato.\n\nSaluti,\n${nome}`);
    
    window.location.href = `mailto:${mailto}?subject=${subject}&body=${body}`;
  }

  // EVENTI
  document.getElementById('flipCard').onclick = () => {
    if(!isFlipped) {
      document.getElementById('flipCard').classList.add('flipped');
      isFlipped = true;
    }
  };
  document.getElementById('nextBtn').onclick = showNext;
  document.getElementById('prevBtn').onclick = () => {
    if(historyIndex > 0) {
      historyIndex--;
      renderCard(shownHistory[historyIndex]);
    }
  };

  init();
</script>

</body>
</html>
