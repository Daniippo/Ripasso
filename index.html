<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Orale Pro</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; --txt: #1e293b; --border: #e2e8f0; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .view { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .hidden { display: none !important; }
        
        /* Card & UI */
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box; }
        button { background: var(--p); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { opacity: 0.9; }
        .btn-alt { background: #f1f5f9; color: var(--txt); border: 1px solid var(--border); }

        /* Flip Card */
        .scene { perspective: 1000px; height: 300px; margin: 20px 0; cursor: pointer; }
        .flip { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip.is-flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: 16px; border: 2px dashed #cbd5e1; box-sizing: border-box; text-align: center; font-size: 1.2rem; font-weight: 600; background: #fff; }
        .back { transform: rotateY(180deg); background: #f0f9ff; color: #0369a1; }
        
        .list-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .list-item:hover { background: #f8fafc; }
        .badge { display: inline-block; padding: 2px 8px; background: #dbeafe; color: #1e40af; border-radius: 6px; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-cat" class="view">
        <div class="card">
            <h2>📚 Catalogo Questionari</h2>
            <p>Inserisci l'URL del foglio Google (pubblicato come CSV):</p>
            <input id="inp-url" type="text" placeholder="Incolla URL qui..." value="">
            <button onclick="loadRemoteIndex()">Carica Indice</button>
            <div id="cat-list">
                </div>
        </div>
    </div>

    <div id="view-game" class="view hidden">
        <button class="btn-alt" onclick="showView('view-cat')">← Torna al Catalogo</button>
        <div class="card">
            <div id="meta"></div>
            <div class="scene" onclick="document.getElementById('card-flip').classList.toggle('is-flipped')">
                <div id="card-flip" class="flip">
                    <div class="face front" id="txt-q">Tocca "Estrai" per iniziare</div>
                    <div class="face back" id="txt-a"></div>
                </div>
            </div>
            <button onclick="draw()">🎲 Estrai Casuale</button>
            <button class="btn-alt" onclick="draw(true)">🔁 Senza Ripetizioni</button>
            <p id="stats" style="text-align: center; font-size: 14px; color: #64748b;"></p>
        </div>
    </div>
</div>

<script>
    let state = { index: [], cards: [], used: [] };

    // Funzione per pulire e convertire l'URL di Google Sheets in CSV
    function cleanUrl(url) {
        if (url.includes('docs.google.com')) {
            const id = url.match(/\/d\/([a-zA-Z0-9-_]+)/)?.[1];
            const gid = url.match(/gid=([0-9]+)/)?.[1] || '0';
            return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
        }
        return url;
    }

    // Carica l'indice dei questionari
    async function loadRemoteIndex() {
        const rawUrl = document.getElementById('inp-url').value;
        if (!rawUrl) return alert("Inserisci un URL");
        
        try {
            const response = await fetch(cleanUrl(rawUrl));
            const data = await response.text();
            const workbook = XLSX.read(data, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            state.index = XLSX.utils.sheet_to_json(sheet);
            renderIndex();
        } catch (e) {
            alert("Errore nel caricamento. Assicurati che il file sia 'Pubblicato sul Web' come CSV.");
        }
    }

    function renderIndex() {
        const container = document.getElementById('cat-list');
        container.innerHTML = "<h3>Set Disponibili:</h3>";
        state.index.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            // Cerchiamo i campi titolo/materia indipendentemente dal maiuscolo/minuscolo
            const titolo = item.titolo || item.Titolo || item.title || "Set senza titolo";
            const url = item.url || item.URL || item.link;
            div.innerHTML = `<strong>${titolo}</strong>`;
            div.onclick = () => loadSet(url);
            container.appendChild(div);
        });
    }

    // Carica le carte di un set specifico
    async function loadSet(url) {
        try {
            const response = await fetch(cleanUrl(url));
            const data = await response.text();
            const workbook = XLSX.read(data, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            state.cards = XLSX.utils.sheet_to_json(sheet);
            state.used = [];
            showView('view-game');
            document.getElementById('txt-q').innerText = "Set caricato! Clicca Estrai.";
            document.getElementById('txt-a').innerText = "";
        } catch (e) {
            alert("Impossibile caricare questo set di carte.");
        }
    }

    function draw(noRepeat = false) {
        let pool = state.cards;
        if (noRepeat) {
            pool = state.cards.filter((_, idx) => !state.used.includes(idx));
        }

        if (pool.length === 0) {
            alert("Tutte le carte sono state visualizzate!");
            state.used = []; // Reset automatico
            return;
        }

        const randomIndex = Math.floor(Math.random() * pool.length);
        const card = pool[randomIndex];
        
        // Trova l'indice originale per il sistema "senza ripetizioni"
        const originalIdx = state.cards.indexOf(card);
        state.used.push(originalIdx);

        // Visualizzazione
        document.getElementById('card-flip').classList.remove('is-flipped');
        setTimeout(() => {
            document.getElementById('txt-q').innerText = card.domanda || card.Domanda || card.question || "Nessuna domanda";
            document.getElementById('txt-a').innerText = card.risposta || card.Risposta || card.answer || "Nessuna risposta";
            document.getElementById('meta').innerHTML = `<span class="badge">${card.unita || card.unit || 'Generale'}</span>`;
            document.getElementById('stats').innerText = `Carte usate: ${state.used.size || state.used.length} / ${state.cards.length}`;
        }, 150);
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>

</body>
</html>
